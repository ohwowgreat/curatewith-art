name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Authenticate PartyKit
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
        run: |
          mkdir -p ~/.partykit
          echo "{\"login\":\"ohwowgreat\",\"access_token\":\"$PARTYKIT_TOKEN\",\"type\":\"clerk\",\"username\":\"ohwowgreat\",\"team\":\"ohwowgreat\"}" > ~/.partykit/config.json
      - name: Deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx partykit deploy --domain curatewith.art
